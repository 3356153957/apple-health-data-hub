id: amazfit-zepp
name: Amazfit / Zepp
kind: source
version: "0.1.0"
sdk_version: ">=0.1,<0.2"
language: python
entrypoint: "plugins.sources.amazfit:AmazfitSource"
emits:
  - measurement.heart_rate
  - measurement.blood_oxygen
  - measurement.sleep_analysis
  - measurement.stress
  - measurement.daily_activity
permissions:
  network: true
  secrets:
    - AMAZFIT_EMAIL
    - AMAZFIT_PASSWORD
    - AMAZFIT_REGION
    - HDH_TOKEN_ENC_KEY
  capabilities:
    - name: "write:oauth_tokens"
      description: "Persist the Zepp/huami app_token (and re-login when it expires)."
    - name: "write:measurements"
      description: "Insert heart rate, SpO2, sleep, stress, and daily activity rows into the per-metric Timescale tables."
    - name: "network:account.huami.com"
      description: "Outbound HTTPS for the huami-token login + token-exchange flow."
    - name: "network:api-mifit-us2.huami.com"
      description: "Outbound HTTPS for the Zepp data API (region-dependent host)."
